name: PR Rubric Smoke

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  rubric-smoke:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smoke scripts
        run: |
          python evals/smoke_test.py
          python evals/resilience_test.py
          python scripts/run_rubric_smoke.py

      - name: Verify smoke artifact
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          result_path = Path("evals/results/smoke/latest.json")
          if not result_path.exists():
              raise SystemExit(f"Missing smoke artifact: {result_path}")

          result = json.loads(result_path.read_text(encoding="utf-8"))
          if result.get("status") != "passed":
              raise SystemExit(f"Smoke status is not passed: {result.get('status')}")
          print(f"Smoke artifact verified: {result_path}")
          PY
